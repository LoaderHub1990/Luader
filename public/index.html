<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Bot Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0c090a;
            color: #c8d2dd;
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            background: #0a0809;
            padding: 20px 12px;
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar .logo {
            font-size: 22px;
            font-weight: 700;
            color: #9466ff;
            margin-bottom: 30px;
            padding-left: 10px;
        }
        .sidebar .logo i { font-size: 28px; margin-right: 10px; }
        .sidebar-item {
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 14px;
            color: #8899aa;
        }
        .sidebar-item:hover { background: #1a1a1a; color: #c8d2dd; }
        .sidebar-item.active {
            background: #1a1a1a;
            color: #9466ff;
            border-left: 3px solid #9466ff;
        }
        .sidebar-item i { font-size: 20px; width: 24px; }

        /* Main */
        .main {
            flex: 1;
            padding: 30px 35px;
            overflow-y: auto;
            background: #0f0c0d;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 26px;
            font-weight: 700;
        }
        .header h1 i { color: #9466ff; margin-right: 10px; }

        .badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }
        .badge.online { background: #00ff8833; color: #00ff88; }
        .badge.offline { background: #ff444433; color: #ff4444; }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #16213e;
            border-radius: 12px;
            padding: 18px 20px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 28px;
            font-weight: 700;
            color: #9466ff;
        }
        .stat-card .label {
            font-size: 13px;
            color: #8899aa;
            margin-top: 4px;
        }

        /* Server Cards Grid */
        .servers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
            margin-bottom: 30px;
        }
        .server-card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid transparent;
        }
        .server-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border-color: #2a2a4a;
        }
        .server-card .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .server-card .name {
            font-size: 17px;
            font-weight: 600;
        }
        .server-card .name i { color: #9466ff; margin-right: 8px; }
        .server-card .status-badge {
            font-size: 11px;
            padding: 3px 12px;
            border-radius: 20px;
            font-weight: 600;
        }
        .status-badge.online { background: #00ff8833; color: #00ff88; }
        .status-badge.offline { background: #ff444433; color: #ff4444; }
        .status-badge.error { background: #ff880033; color: #ff8800; }
        .server-card .info {
            display: flex;
            gap: 18px;
            font-size: 13px;
            color: #778899;
            margin: 12px 0;
        }
        .server-card .info span { display: flex; align-items: center; gap: 5px; }
        .server-card .actions {
            display: flex;
            gap: 8px;
            margin-top: 14px;
        }
        .server-card .actions button {
            flex: 1;
            padding: 8px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
        }
        .server-card .actions button:hover { opacity: 0.8; }
        .btn-start { background: #00ff88; color: #0c090a; }
        .btn-stop { background: #ff4444; color: #fff; }

        /* Logs */
        .log-container {
            background: #0a0809;
            border: 1px solid #1a1a1a;
            border-radius: 10px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            margin-top: 20px;
        }
        .log-container .log-line {
            padding: 3px 0;
            border-bottom: 1px solid #0d0d0d;
            color: #8899aa;
        }
        .log-container .log-line .time {
            color: #556677;
            margin-right: 12px;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo"><i class="bi bi-cpu"></i>Bot Panel</div>
        <div class="sidebar-item active">
            <i class="bi bi-grid-1x2-fill"></i> Dashboard
        </div>
        <div class="sidebar-item">
            <i class="bi bi-box-fill"></i> เซิร์ฟเวอร์
        </div>
        <div class="sidebar-item">
            <i class="bi bi-gear-fill"></i> ตั้งค่า
        </div>
        <div class="sidebar-item" style="margin-top:50px;color:#ff4444;">
            <i class="bi bi-box-arrow-right"></i> ออกจากระบบ
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">
        <div class="header">
            <h1><i class="bi bi-activity"></i>Dashboard</h1>
            <span class="badge" id="statusBadge">🔄 กำลังโหลด...</span>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="number" id="statTotal">0</div>
                <div class="label">🤖 จำนวนบอท</div>
            </div>
            <div class="stat-card">
                <div class="number" id="statOnline">0</div>
                <div class="label">🟢 ออนไลน์</div>
            </div>
            <div class="stat-card">
                <div class="number" id="statCommands">0</div>
                <div class="label">📝 คำสั่งทั้งหมด</div>
            </div>
        </div>

        <!-- Bot Cards -->
        <h3 style="margin-bottom:15px;color:#8899aa;font-size:15px;">
            <i class="bi bi-robot" style="color:#9466ff;"></i> บอททั้งหมด
        </h3>
        <div class="servers-grid" id="botGrid">
            <!-- JavaScript จะสร้างการ์ดบอททั้งหมด -->
        </div>

        <!-- Logs -->
        <div class="log-container" id="logContainer">
            <div class="log-line"><span class="time">[ระบบ]</span> กำลังโหลด Dashboard...</div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script>
        const socket = io();
        let bots = {};

        function addLog(msg) {
            const container = document.getElementById('logContainer');
            const time = new Date().toLocaleTimeString();
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerHTML = `<span class="time">[${time}]</span> ${msg}`;
            container.appendChild(line);
            container.scrollTop = container.scrollHeight;
        }

        function renderBots() {
            const grid = document.getElementById('botGrid');
            const ids = Object.keys(bots);

            if (ids.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;color:#556677;padding:40px;">
                        <i class="bi bi-inbox" style="font-size:40px;display:block;margin-bottom:10px;"></i>
                        ยังไม่มีบอท<br>
                        <span style="font-size:13px;">เพิ่ม Token ใน .env (TOKENS=token1,token2,...)</span>
                    </div>
                `;
                return;
            }

            grid.innerHTML = ids.map(id => {
                const bot = bots[id];
                return `
                    <div class="server-card">
                        <div class="top">
                            <span class="name"><i class="bi bi-robot"></i> บอท #${id}</span>
                            <span class="status-badge ${bot.status}">
                                ${bot.status === 'online' ? '🟢 ออนไลน์' : 
                                  bot.status === 'error' ? '🟠 Error' : 
                                  '🔴 ออฟไลน์'}
                            </span>
                        </div>
                        <div class="info">
                            <span><i class="bi bi-tag-fill"></i> ${bot.tag || 'ไม่ทราบ'}</span>
                            <span><i class="bi bi-command"></i> ${bot.commands || 0}</span>
                            <span><i class="bi bi-server"></i> ${bot.guilds || 0}</span>
                        </div>
                        <div class="actions">
                            <button class="btn-start" onclick="controlBot('${id}', 'start')">▶ เริ่ม</button>
                            <button class="btn-stop" onclick="controlBot('${id}', 'stop')">⏹ หยุด</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats() {
            const ids = Object.keys(bots);
            const total = ids.length;
            const online = ids.filter(id => bots[id].status === 'online').length;
            const commands = ids.reduce((sum, id) => sum + (bots[id].commands || 0), 0);

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statOnline').textContent = online;
            document.getElementById('statCommands').textContent = commands;

            const badge = document.getElementById('statusBadge');
            if (online > 0) {
                badge.className = 'badge online';
                badge.textContent = `🟢 ออนไลน์ ${online}/${total} ตัว`;
            } else {
                badge.className = 'badge offline';
                badge.textContent = `🔴 ออฟไลน์ ${total} ตัว`;
            }
        }

        socket.on('botStatus', (data) => {
            bots = data;
            renderBots();
            updateStats();
        });

        async function controlBot(id, action) {
            const url = `/api/bot/${id}/${action}`;
            const msg = action === 'start' ? `▶ กำลังเริ่มบอท #${id}...` : `⏹ กำลังหยุดบอท #${id}...`;
            addLog(`🔄 ${msg}`);
            
            try {
                const res = await fetch(url, { method: 'POST' });
                const data = await res.json();
                addLog(`✅ ${action} บอท #${id}: ${data.status}`);
            } catch (err) {
                addLog(`❌ Error: ${err.message}`);
            }
        }

        // โหลดสถานะครั้งแรก
        fetch('/api/status')
            .then(res => res.json())
            .then(data => {
                bots = data;
                renderBots();
                updateStats();
                addLog(`✅ โหลดสถานะสำเร็จ (${Object.keys(bots).length} บอท)`);
            })
            .catch(err => addLog(`❌ โหลดสถานะล้มเหลว: ${err.message}`));
    </script>
</body>
</html>
